<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDINO 제주 — AI 프로그램 상담</title>
<link href="https://fonts.googleapis.com/css2?family=Maru+Buri:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1714; --stone: #4a4540; --dust: #8c857d;
    --cream: #f5f0ea; --sand: #e8e0d4;
    --sea: #2d6a7f; --sea-dark: #235e72; --sea-light: #e8f2f6;
    --green: #3d6b52; --green-light: #e8f0eb;
    --amber: #c17f3a; --amber-light: #faf0e3;
    --coral: #c45a3a; --white: #fdfcfb;
  }
  html, body { height: 100%; }
  body {
    font-family: 'Maru Buri', 'Noto Sans KR', sans-serif;
    background: #f0ebe4;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 16px;
  }
  .app {
    width: 100%; max-width: 480px;
    background: var(--white);
    border-radius: 16px; overflow: hidden;
    display: flex; flex-direction: column;
    height: 90vh; max-height: 760px;
    box-shadow: 0 20px 60px rgba(26,23,20,0.15);
  }
  .header {
    background: linear-gradient(135deg, #1a2f3a 0%, #2d4a3e 100%);
    padding: 18px 20px 16px; flex-shrink: 0;
  }
  .header-top { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(245,200,122,0.2);
    border: 1.5px solid rgba(245,200,122,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-name { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 2px; }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.5); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4ade80; flex-shrink: 0;
    box-shadow: 0 0 6px rgba(74,222,128,0.5);
  }
  .header-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .h-tag {
    font-size: 10px; padding: 3px 9px; border-radius: 20px;
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7);
    cursor: pointer; transition: background 0.2s; border: none;
    font-family: 'Maru Buri', 'Noto Sans KR', sans-serif;
  }
  .h-tag:hover { background: rgba(255,255,255,0.2); }
  .messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 2px; }
  .msg { display: flex; gap: 10px; align-items: flex-end; animation: fadeUp 0.3s ease; }
  .msg.user { flex-direction: row-reverse; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, #1a2f3a, #2d4a3e);
    display: flex; align-items: center; justify-content: center; font-size: 13px;
  }
  .msg-avatar.user { background: var(--sea); }
  .bubble {
    max-width: 78%; padding: 10px 14px;
    border-radius: 16px; font-size: 13px; line-height: 1.75; color: var(--ink);
  }
  .bot .bubble { background: var(--cream); border-bottom-left-radius: 4px; }
  .user .bubble { background: var(--sea); border-bottom-right-radius: 4px; color: #fff; }
  .quick-replies { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; margin-left: 38px; }
  .qr-btn {
    font-size: 12px; padding: 6px 12px; border-radius: 20px;
    border: 1px solid var(--sand); background: var(--white); color: var(--stone);
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s;
  }
  .qr-btn:hover { background: var(--sea); color: #fff; border-color: var(--sea); }
  .bubble { white-space: pre-wrap; }
  .typing-indicator { display: flex; gap: 4px; padding: 12px 14px; }
  .typing-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--dust); animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }
  .suggestions {
    padding: 10px 16px; border-top: 1px solid var(--sand);
    display: flex; gap: 6px; overflow-x: auto; flex-shrink: 0;
  }
  .suggestions::-webkit-scrollbar { display: none; }
  .sug-btn {
    white-space: nowrap; font-size: 11px; padding: 5px 11px;
    border-radius: 20px; border: 1px solid var(--sand);
    background: var(--white); color: var(--stone); cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; flex-shrink: 0;
  }
  .sug-btn:hover { background: var(--cream); border-color: var(--dust); }
  .input-area {
    padding: 12px 16px; border-top: 1px solid var(--sand);
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--white); flex-shrink: 0;
  }
  .input-wrap { flex: 1; }
  textarea {
    width: 100%; border: 1.5px solid var(--sand);
    border-radius: 12px; padding: 10px 14px;
    font-size: 13px; font-family: 'Maru Buri', 'Noto Sans KR', sans-serif;
    color: var(--ink); background: var(--cream);
    resize: none; outline: none; line-height: 1.5;
    max-height: 100px; min-height: 42px; transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--sea); background: var(--white); }
  textarea::placeholder { color: var(--dust); }
  .send-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--sea); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.2s;
  }
  .send-btn:hover { background: var(--sea-dark); }
  .send-btn svg { width: 18px; height: 18px; fill: #fff; }
  .send-btn:disabled { background: var(--sand); cursor: not-allowed; }
  .contact-card {
    margin-top: 8px; padding: 10px 13px;
    background: var(--white); border: 1px solid var(--sand);
    border-radius: 10px; font-size: 12px; color: var(--stone); line-height: 1.8;
  }
  .contact-card a { color: var(--sea); text-decoration: none; font-weight: 500; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="avatar">🌊</div>
      <div class="header-info">
        <p class="header-name">IDINO 제주 상담 AI</p>
        <p class="header-sub">박영미 Center Head · 『인생2막 AI에 올라타라』 저자</p>
      </div>
      <div class="status-dot"></div>
    </div>
    <div class="header-tags">
      <button class="h-tag" onclick="quickSend('4월 프로그램 알려줘')">🌺 4월 프로그램</button>
      <button class="h-tag" onclick="quickSend('가격이 어떻게 돼요?')">💰 가격 문의</button>
      <button class="h-tag" onclick="quickSend('예약은 어떻게 해요?')">📋 예약 방법</button>
      <button class="h-tag" onclick="quickSend('항공권 포함인가요?')">✈️ 항공 안내</button>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">
      <div class="msg-avatar">🌊</div>
      <div>
        <div class="bubble">안녕하세요! 👋
<strong>아이디노 제주 런케이션 센터</strong> 상담 AI입니다.

4월에는 3가지 색다른 제주를 만나세요 🌺
한강 낭독 × 오름 트래킹 × AI 인생설계

궁금한 것을 편하게 물어보세요! 😊</div>
        <div class="quick-replies">
          <button class="qr-btn" onclick="quickSend('4월 프로그램이 뭔가요?')">4월 프로그램 소개</button>
          <button class="qr-btn" onclick="quickSend('가격표 보여줘')">가격표 보기</button>
          <button class="qr-btn" onclick="quickSend('항공권 포함인가요?')">항공 안내</button>
        </div>
      </div>
    </div>
  </div>

  <div class="suggestions">
    <button class="sug-btn" onclick="quickSend('트래킹이 힘들지 않나요?')">트래킹 난이도</button>
    <button class="sug-btn" onclick="quickSend('포구 생선 직구는 뭔가요?')">포구 옵션</button>
    <button class="sug-btn" onclick="quickSend('취소하면 환불되나요?')">취소·환불</button>
    <button class="sug-btn" onclick="quickSend('수영장은 언제 쓸 수 있나요?')">수영장 이용</button>
    <button class="sug-btn" onclick="quickSend('바베큐 가능한가요?')">바베큐·불멍</button>
    <button class="sug-btn" onclick="quickSend('취사는 어디서 되나요?')">취사 가능 공간</button>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="궁금한 점을 입력해 주세요..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `당신은 아이디노 제주 런케이션 센터의 친절한 상담 AI입니다.
아래 정보를 바탕으로 짧고 명확하게 답변해 주세요. 이모지를 적절히 활용하고, 따뜻하고 친근한 톤을 유지하세요.
답변은 200자 이내로 간결하게. 복잡한 내용은 줄바꿈으로 정리.

【센터 정보】
- 이름: 아이디노(IDINO) 제주 런케이션 센터
- 위치: 제주 서귀포시 안덕면 난드르로 21번길 26
- 슬로건: 4월에는 3가지 색다른 제주를 만나세요
- 특징: 1층 바닷가 수영장(7~8월 한여름만 운영), 루프탑 360도 파노라마뷰(한라산·군산오름·박수기정)
- 운영: 박영미 Center Head (저서: 인생2막 AI에 올라타라)
- 연락: 010-3274-2745, 홈페이지 구글폼, 인스타 @idinoproject

【2026 시그니처 프로그램 (매월 1회, 2박3일)】
1. 4월 작별하지 않는다 — 한강 낭독 x 오름 트래킹 x AI 워크숍 (4/16~4/18) ← 현재 모집중
2. 5월 제주 낭만버스킹 (준비중)
3. 6월 런케이션 챌린지 (준비중)
4. 8월 AI 브랜드 콘텐츠 부트캠프 (준비중)
5. 10월 디지털 디톡스 (준비중)
6. 11월 작별하지 않는다 2회차 (준비중)

【4월 일정 (4/16~4/18)】
- Day1: 체크인→낭독세션1부→나이트라이팅
- Day2: 루프탑 새벽묵상→오름 트래킹→AI워크숍1→포구석식→낭독세션2부
- Day3: AI워크숍2→루프탑 편지쓰기→수료브런치→체크아웃

【객실】
- 크레오: 1~2인, 1박 8만원, 오션뷰 개별테라스
- 코피아: 4~5인, 1박 15만원, 투룸 취사 가능(숯불 불가)
- 콤마: 7~8인, 1박 28만원, 쓰리룸 복층 취사 가능(숯불 불가) 테라스4개

【가격 (항공 불포함 / 2박3일 / 숙박+프로그램+조식2+석식2 포함)】
- 1인 단독(크레오): 48만원
- 2인(크레오 공유): 40만원/인
- 4~5인(코피아, 5%할인): 37만원~/인
- 6~7인(콤마, 10%할인): 35만원/인
- 8인 단체(콤마 전실, 15%할인): 33만원/인
- 8인 프리미엄(포구옵션포함): 35만원/인
※ 항공권 불포함. 공항에서 약 40~50분 소요.

【수영장】 1층 위치 / 7~8월 한여름 시즌만 운영

【바베큐·불멍】 5~10월 바람 없는 날만 / 야외 지정공간 / 숯불·직화 전 공간 불가

【취사 가능 공간】 1층 라운지 공유주방 / 3층 루프탑 주방 / 콤마 1층 주방 / 201호 코피아 (모두 숯불·직화 불가)

【포구 프리미엄 옵션】 대평포구(5분)/예래포구(8분) 생선직구→콤마 주방 취사 / 8인단체만 가능 / +2만원/인 / 날씨따라 변경가능 차액환불

【트래킹】 기본:군산오름(왕복2시간,초중급,자체가이드) / 날씨·수준에따라 다른 오름 또는 곶자왈로 변경가능

【예약】 전화/문자 010-3274-2745 / 구글폼 / 인스타DM / 전액결제 선착순 / 하나은행 455-910356-88107 박영미

【취소】 7일전:전액환불 / 3~6일전:50% / 2일이내:불가 / 최소4인미달:전액환불

답변불가시 "010-3274-2745로 문의해 주세요" 안내.`;

let isLoading = false;
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const conversationHistory = [];

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function quickSend(text) { inputEl.value = text; sendMessage(); }

function addMessage(role, content, extras) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const av = document.createElement('div');
  av.className = 'msg-avatar ' + role;
  av.textContent = role === 'bot' ? '🌊' : '👤';
  const inner = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  inner.appendChild(bubble);
  if (extras) inner.appendChild(extras);
  div.appendChild(av);
  div.appendChild(inner);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = '<div class="msg-avatar">🌊</div><div><div class="bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function removeTyping() { const el = document.getElementById('typing'); if (el) el.remove(); }

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;
  isLoading = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = '42px';
  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  addTyping();
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });
    const data = await response.json();
    removeTyping();
    const reply = data.content?.[0]?.text || '죄송합니다, 잠시 후 다시 시도해 주세요.';
    conversationHistory.push({ role: 'assistant', content: reply });
    const needsContact = ['예약','결제','취소','환불','문의'].some(k => text.includes(k));
    let extra = null;
    if (needsContact) {
      extra = document.createElement('div');
      extra.className = 'contact-card';
      extra.innerHTML = '📞 <a href="tel:010-3274-2745">010-3274-2745</a> (전화·문자)<br>🌐 <a href="http://idinojeju.com" target="_blank">idinojeju.com</a> 예약 게시판<br>📸 <a href="https://instagram.com/idinoproject" target="_blank">@idinoproject</a> DM';
    }
    addMessage('bot', reply, extra);
  } catch (err) {
    removeTyping();
    addMessage('bot', '일시적인 오류가 발생했습니다.\n📞 010-3274-2745로 문의해 주세요!');
  }
  isLoading = false;
  sendBtn.disabled = false;
  inputEl.focus();
}
</script>
</body>
</html>
