<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDINO 제주 — AI 프로그램 상담</title>
<link href="https://fonts.googleapis.com/css2?family=Maru+Buri:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1714; --stone: #4a4540; --dust: #8c857d;
    --cream: #f5f0ea; --sand: #e8e0d4;
    --sea: #2d6a7f; --sea-dark: #235e72; --sea-light: #e8f2f6;
    --green: #3d6b52; --green-light: #e8f0eb;
    --amber: #c17f3a; --amber-light: #faf0e3;
    --coral: #c45a3a; --white: #fdfcfb;
  }
  html, body { height: 100%; }
  body {
    font-family: 'Maru Buri', 'Noto Sans KR', sans-serif;
    background: #f0ebe4; display: flex; align-items: center;
    justify-content: center; min-height: 100vh; padding: 16px;
  }
  .app {
    width: 100%; max-width: 480px; background: var(--white);
    border-radius: 16px; overflow: hidden; display: flex; flex-direction: column;
    height: 90vh; max-height: 760px; box-shadow: 0 20px 60px rgba(26,23,20,0.15);
  }
  .header { background: linear-gradient(135deg, #1a2f3a 0%, #2d4a3e 100%); padding: 18px 20px 16px; flex-shrink: 0; }
  .header-top { display: flex; align-items: center; gap: 12px; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(245,200,122,0.2); border: 1.5px solid rgba(245,200,122,0.4); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .header-info { flex: 1; }
  .header-name { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 2px; }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.5); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; flex-shrink: 0; box-shadow: 0 0 6px rgba(74,222,128,0.5); }
  .header-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .h-tag { font-size: 10px; padding: 3px 9px; border-radius: 20px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); cursor: pointer; border: none; font-family: 'Noto Sans KR', sans-serif; }
  .h-tag:hover { background: rgba(255,255,255,0.2); }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 2px; }
  .msg { display: flex; gap: 10px; align-items: flex-end; animation: fadeUp 0.3s ease; }
  .msg.user { flex-direction: row-reverse; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .msg-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, #1a2f3a, #2d4a3e); display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .msg-avatar.user { background: var(--sea); }
  .bubble { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 13px; line-height: 1.8; }
  .bot .bubble { background: var(--cream); border-bottom-left-radius: 4px; color: var(--ink); white-space: pre-line; }
  .user .bubble { background: var(--sea); border-bottom-right-radius: 4px; color: #fff; }
  .quick-replies { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; margin-left: 38px; }
  .qr-btn { font-size: 12px; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--sand); background: var(--white); color: var(--stone); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s; }
  .qr-btn:hover { background: var(--sea); color: #fff; border-color: var(--sea); }
  .typing-indicator { display: flex; gap: 4px; padding: 12px 14px; }
  .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dust); animation: bounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);} 40%{transform:translateY(-6px);} }
  .suggestions { padding: 10px 16px; border-top: 1px solid var(--sand); display: flex; gap: 6px; overflow-x: auto; flex-shrink: 0; }
  .suggestions::-webkit-scrollbar { display: none; }
  .sug-btn { white-space: nowrap; font-size: 11px; padding: 5px 11px; border-radius: 20px; border: 1px solid var(--sand); background: var(--white); color: var(--stone); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; flex-shrink: 0; }
  .sug-btn:hover { background: var(--cream); }
  .input-area { padding: 12px 16px; border-top: 1px solid var(--sand); display: flex; gap: 10px; align-items: flex-end; background: var(--white); flex-shrink: 0; }
  .input-wrap { flex: 1; }
  textarea { width: 100%; border: 1.5px solid var(--sand); border-radius: 12px; padding: 10px 14px; font-size: 13px; font-family: 'Maru Buri', 'Noto Sans KR', sans-serif; color: var(--ink); background: var(--cream); resize: none; outline: none; line-height: 1.5; max-height: 100px; min-height: 42px; transition: border-color 0.2s; }
  textarea:focus { border-color: var(--sea); background: var(--white); }
  textarea::placeholder { color: var(--dust); }
  .send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--sea); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send-btn:hover { background: var(--sea-dark); }
  .send-btn svg { width: 18px; height: 18px; fill: #fff; }
  .contact-card { margin-top: 8px; padding: 10px 13px; background: var(--white); border: 1px solid var(--sand); border-radius: 10px; font-size: 12px; color: var(--stone); line-height: 1.8; }
  .contact-card a { color: var(--sea); text-decoration: none; font-weight: 500; }
</style>
</head>

function findAnswer(text) {
  const t = text.toLowerCase();
  let best = null, bestScore = 0;
  for (const faq of FAQ) {
    const score = faq.keys.filter(k => t.includes(k.toLowerCase())).length;
    if (score > bestScore) { bestScore = score; best = faq; }
  }
  return bestScore > 0 ? best : null;
}

function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function quickSend(text) { document.getElementById('input').value=text; sendMessage(); }

function addMsg(role, text, faq) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg '+role;
  const av = document.createElement('div');
  av.className = 'msg-avatar '+role;
  av.textContent = role==='bot' ? '🌺' : '👤';
  const inner = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  inner.appendChild(bubble);
  if (role==='bot' && faq && faq.contact) {
    const card = document.createElement('div');
    card.className = 'contact-card';
    card.innerHTML = '📞 <a href="tel:010-3274-2745">010-3274-2745</a><br>🌐 <a href="idino-reservation.html">예약 신청하기</a><br>📸 <a href="https://instagram.com/idinoproject" target="_blank">@idinoproject</a>';
    inner.appendChild(card);
  }
  if (role==='bot' && faq && faq.quick) {
    const qr = document.createElement('div');
    qr.className = 'quick-replies';
    faq.quick.forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'qr-btn'; btn.textContent = q;
      btn.onclick = () => quickSend(q);
      qr.appendChild(btn);
    });
    inner.appendChild(qr);
  }
  div.appendChild(av); div.appendChild(inner);
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function addTyping() {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className='msg bot'; div.id='typing';
  div.innerHTML='<div class="msg-avatar">🌺</div><div><div class="bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>';
  wrap.appendChild(div); wrap.scrollTop=wrap.scrollHeight;
}
function removeTyping() { const el=document.getElementById('typing'); if(el) el.remove(); }

function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  input.value=''; input.style.height='42px';
  addMsg('user', text, null);
  addTyping();
  setTimeout(() => {
    removeTyping();
    const faq = findAnswer(text);
    addMsg('bot', faq ? faq.answer : FALLBACK,
      faq || {contact:true, quick:['4월 프로그램이 뭔가요?','가격 알려줘','예약은 어떻게 해요?']});
  }, 600);
}
