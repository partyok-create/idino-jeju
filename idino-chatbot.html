• 주차: 아이디노 내 주차공간 있어요
• 공항에서 차량으로 약 40~50분
• 렌터카 / 택시 / 버스 모두 이용 가능

차량 없이도 OK!
트래킹 이동 시 아이디노 차량으로 함께 이동해요 🚐`,
    quick:['항공권 포함인가요?','예약은 어떻게 해요?'] },
];

const FALLBACK = `죄송해요, 잘 이해하지 못했어요 😅

아래로 직접 문의해 주시면 더 자세히 안내드릴게요!

📞 010-3274-2745 (전화·문자)
📸 인스타그램 @idinoproject`;

function findAnswer(text) {
  const t = text.toLowerCase();
  let best = null, bestScore = 0;
  for (const faq of FAQ) {
    const score = faq.keys.filter(k => t.includes(k.toLowerCase())).length;
    if (score > bestScore) { bestScore = score; best = faq; }
  }
  return bestScore > 0 ? best : null;
}

function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function quickSend(text) { document.getElementById('input').value=text; sendMessage(); }

function addMsg(role, text, faq) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg '+role;
  const av = document.createElement('div');
  av.className = 'msg-avatar '+role;
  av.textContent = role==='bot' ? '🌺' : '👤';
  const inner = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  inner.appendChild(bubble);
  if (role==='bot' && faq && faq.contact) {
    const card = document.createElement('div');
    card.className = 'contact-card';
    card.innerHTML = '📞 <a href="tel:010-3274-2745">010-3274-2745</a><br>🌐 <a href="idino-reservation.html">예약 신청하기</a><br>📸 <a href="https://instagram.com/idinoproject" target="_blank">@idinoproject</a>';
    inner.appendChild(card);
  }
  if (role==='bot' && faq && faq.quick) {
    const qr = document.createElement('div');
    qr.className = 'quick-replies';
    faq.quick.forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'qr-btn'; btn.textContent = q;
      btn.onclick = () => quickSend(q);
      qr.appendChild(btn);
    });
    inner.appendChild(qr);
  }
  div.appendChild(av); div.appendChild(inner);
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function addTyping() {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className='msg bot'; div.id='typing';
  div.innerHTML='<div class="msg-avatar">🌺</div><div><div class="bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>';
  wrap.appendChild(div); wrap.scrollTop=wrap.scrollHeight;
}
function removeTyping() { const el=document.getElementById('typing'); if(el) el.remove(); }

function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  input.value=''; input.style.height='42px';
  addMsg('user', text, null);
  addTyping();
  setTimeout(() => {
    removeTyping();
    const faq = findAnswer(text);
    addMsg('bot', faq ? faq.answer : FALLBACK,
      faq || {contact:true, quick:['4월 프로그램이 뭔가요?','가격 알려줘','예약은 어떻게 해요?']});
  }, 600);
}
</script>
