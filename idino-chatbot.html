<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDINO 제주 — AI 프로그램 상담</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1714; --stone: #4a4540; --dust: #8c857d;
    --cream: #f5f0ea; --sand: #e8e0d4;
    --sea: #2d6a7f; --sea-dark: #235e72; --sea-light: #e8f2f6;
    --green: #3d6b52; --green-light: #e8f0eb;
    --amber: #c17f3a; --amber-light: #faf0e3;
    --white: #fdfcfb;
  }

  html, body { height: 100%; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f0ebe4;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 16px;
  }

  .app {
    width: 100%; max-width: 480px;
    background: var(--white);
    border-radius: 16px;
    overflow: hidden;
    display: flex; flex-direction: column;
    height: 90vh; max-height: 760px;
    box-shadow: 0 20px 60px rgba(26,23,20,0.15);
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a2f3a 0%, #2d4a3e 100%);
    padding: 18px 20px 16px;
    flex-shrink: 0;
  }
  .header-top { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(245,200,122,0.2);
    border: 1.5px solid rgba(245,200,122,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-name { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 2px; }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.5); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4ade80; flex-shrink: 0;
    box-shadow: 0 0 6px rgba(74,222,128,0.5);
  }
  .header-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .h-tag {
    font-size: 10px; padding: 3px 9px; border-radius: 20px;
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7);
    cursor: pointer; transition: background 0.2s; border: none;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .h-tag:hover { background: rgba(255,255,255,0.2); }

  /* MESSAGES */
  .messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 2px; }

  .msg { display: flex; gap: 10px; align-items: flex-end; animation: fadeUp 0.3s ease; }
  .msg.user { flex-direction: row-reverse; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, #1a2f3a, #2d4a3e);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .msg-avatar.user { background: var(--sea); }

  .bubble {
    max-width: 78%; padding: 10px 14px;
    border-radius: 16px; font-size: 13px; line-height: 1.75;
    color: var(--ink);
  }
  .bot .bubble {
    background: var(--cream); border-bottom-left-radius: 4px;
    color: var(--ink);
  }
  .user .bubble {
    background: var(--sea); border-bottom-right-radius: 4px;
    color: #fff;
  }
  .bubble strong { font-weight: 700; }
  .bubble .price { color: var(--sea); font-weight: 700; }
  .user .bubble .price { color: #f5c87a; }
  .bubble br { display: block; content: ""; margin-top: 4px; }

  /* QUICK REPLIES */
  .quick-replies {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 8px; margin-left: 38px;
  }
  .qr-btn {
    font-size: 12px; padding: 6px 12px; border-radius: 20px;
    border: 1px solid var(--sand); background: var(--white);
    color: var(--stone); cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }
  .qr-btn:hover { background: var(--sea); color: #fff; border-color: var(--sea); }

  /* TYPING */
  .typing-indicator { display: flex; gap: 4px; padding: 12px 14px; }
  .typing-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--dust); animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* SUGGESTIONS */
  .suggestions {
    padding: 10px 16px; border-top: 1px solid var(--sand);
    display: flex; gap: 6px; overflow-x: auto; flex-shrink: 0;
  }
  .suggestions::-webkit-scrollbar { display: none; }
  .sug-btn {
    white-space: nowrap; font-size: 11px; padding: 5px 11px;
    border-radius: 20px; border: 1px solid var(--sand);
    background: var(--white); color: var(--stone); cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s; flex-shrink: 0;
  }
  .sug-btn:hover { background: var(--cream); border-color: var(--dust); }

  /* INPUT */
  .input-area {
    padding: 12px 16px; border-top: 1px solid var(--sand);
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--white); flex-shrink: 0;
  }
  .input-wrap { flex: 1; position: relative; }
  textarea {
    width: 100%; border: 1.5px solid var(--sand);
    border-radius: 12px; padding: 10px 14px;
    font-size: 13px; font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink); background: var(--cream);
    resize: none; outline: none; line-height: 1.5;
    max-height: 100px; min-height: 42px;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--sea); background: var(--white); }
  textarea::placeholder { color: var(--dust); }

  .send-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--sea); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.2s, transform 0.1s;
  }
  .send-btn:hover { background: var(--sea-dark); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 18px; height: 18px; fill: #fff; }
  .send-btn:disabled { background: var(--sand); cursor: not-allowed; }

  /* CONTACT CARD */
  .contact-card {
    margin-top: 8px; padding: 10px 13px;
    background: var(--white); border: 1px solid var(--sand);
    border-radius: 10px; font-size: 12px; color: var(--stone);
    line-height: 1.8;
  }
  .contact-card a { color: var(--sea); text-decoration: none; font-weight: 500; }

  .info-card {
    margin-top: 6px; background: var(--sea-light);
    border-radius: 8px; padding: 10px 12px;
    font-size: 12px; color: var(--stone); line-height: 1.7;
    border-left: 3px solid var(--sea);
  }
  .info-card .row { display: flex; justify-content: space-between; padding: 2px 0; }
  .info-card .label { color: var(--dust); }
  .info-card .value { font-weight: 500; color: var(--ink); }
</style>
</head>

답변할 수 없는 내용은 "더 자세한 내용은 010-3274-2745로 문의해 주세요"라고 안내하세요.`;

let isLoading = false;
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const conversationHistory = [];

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function quickSend(text) {
  inputEl.value = text;
  sendMessage();
}

function addMessage(role, content, extras) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatarDiv = document.createElement('div');
  avatarDiv.className = `msg-avatar ${role}`;
  avatarDiv.textContent = role === 'bot' ? '🌊' : '👤';
  const innerDiv = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = content.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  innerDiv.appendChild(bubble);
  if (extras) innerDiv.appendChild(extras);
  div.appendChild(avatarDiv);
  div.appendChild(innerDiv);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">🌊</div><div><div class="bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;
  isLoading = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = '42px';

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  addTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    removeTyping();

    const reply = data.content?.[0]?.text || '죄송합니다, 잠시 후 다시 시도해 주세요.';
    conversationHistory.push({ role: 'assistant', content: reply });

    // 예약 관련 답변이면 연락처 카드 추가
    const needsContact = ['예약', '결제', '취소', '환불', '문의'].some(k => text.includes(k));
    let extra = null;
    if (needsContact) {
      extra = document.createElement('div');
      extra.className = 'contact-card';
      extra.innerHTML = `📞 <a href="tel:010-3274-2745">010-3274-2745</a> (전화·문자)<br>🌐 <a href="http://idinojeju.com" target="_blank">idinojeju.com</a> 예약 게시판<br>📸 <a href="https://instagram.com/idinoproject" target="_blank">@idinoproject</a> DM`;
    }

    addMessage('bot', reply, extra);

    // 가격 질문이면 빠른 답변 버튼
    const isPriceQ = ['가격', '얼마', '비용', '금액'].some(k => text.includes(k));
    if (isPriceQ) {
      const qr = document.createElement('div');
      qr.className = 'quick-replies';
      qr.innerHTML = `
        <button class="qr-btn" onclick="quickSend('8인 단체 할인율이 어떻게 돼요?')">단체 할인</button>
        <button class="qr-btn" onclick="quickSend('혼자 신청하면 얼마예요?')">1인 가격</button>
        <button class="qr-btn" onclick="quickSend('포구 옵션은 뭔가요?')">포구 옵션</button>`;
      messagesEl.lastChild.querySelector('div:last-child').appendChild(qr);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

  } catch (err) {
    removeTyping();
    addMessage('bot', '일시적인 오류가 발생했습니다. 직접 문의해 주세요!\n📞 010-3274-2745');
  }

  isLoading = false;
  sendBtn.disabled = false;
  inputEl.focus();
}
</script>
</body>
</html>
